<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quizlet Learn Clone with Save</title>

<style>

body {
  font-family: system-ui, sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 16px;
  font-size: 18px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.hidden {
  display: none;
}

textarea {
  width: 100%;
  height: 200px;
  font-family: monospace;
  padding: 12px;
  box-sizing: border-box;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 14px 18px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
}

button:hover {
  background: #2563eb;
}

.prompt {
  font-size: 28px;
  margin-bottom: 18px;
}

input[type="text"] {
  width: 100%;
  font-size: 20px;
  padding: 12px;
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.feedback {
  margin-top: 10px;
  font-weight: bold;
}

.correct { color: green; }
.incorrect { color: red; }

.progress {
  margin-top: 15px;
  color: #555;
}

.streak {
  margin-top: 8px;
  font-size: 14px;
  color: #666;
}

/* Preset selector */

.preset-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.preset-row label {
  font-weight: 600;
  white-space: nowrap;
}

.preset-row select {
  flex: 1;
  font-size: 16px;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.preset-row button {
  width: auto;
}

.divider {
  text-align: center;
  color: #999;
  margin: 10px 0 6px;
  font-size: 13px;
  position: relative;
}

.divider::before,
.divider::after {
  content: '';
  display: inline-block;
  width: 38%;
  height: 1px;
  background: #ddd;
  vertical-align: middle;
  margin: 0 6px;
}

/* Mobile tweaks */

@media (max-width: 600px) {

  body {
    font-size: 17px;
  }

  h1 {
    font-size: 24px;
  }

  .card {
    padding: 16px;
  }

  .prompt {
    font-size: 26px;
  }

  .preset-row {
    flex-direction: column;
    align-items: stretch;
  }

  .preset-row button {
    width: 100%;
  }

}

</style>
</head>

<body>

<h1>Quizlet Learn (Clone with Save)</h1>

<div class="container">

<!-- Paste Mode -->

<div class="card" id="pasteCard">

<h2>Paste Quizlet Set</h2>

<div class="preset-row">
<label for="presetSelect">Preset:</label>
<select id="presetSelect">
<option value="">— choose a preset set —</option>
</select>
<button onclick="loadPreset()">Load</button>
</div>

<div class="divider">or paste your own</div>

<p>Format: <code>term[TAB]answer1;answer2</code></p>

<textarea id="dataInput" placeholder="adult	大人;おとな"></textarea>

<button onclick="startLearn(false)">Start Learn Mode</button>

</div>

<!-- Learn Mode -->

<div class="card hidden" id="learnCard">

<h2>Learn Mode</h2>

<div id="learnArea"></div>

</div>

</div>

<script src="sets.js"></script>

<script>

let cards = [];
let queue = [];
let current = null;
let lastCard = null;
let correctionMode = false;
let isTransitioning = false;

function populatePresets() {
  const select = document.getElementById("presetSelect");

  PRESET_SETS.forEach((set, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = set.name;
    select.appendChild(opt);
  });
}

function loadPreset() {

  const select = document.getElementById("presetSelect");
  const idx = select.value;

  if (idx === "") return;

  document.getElementById("dataInput").value = PRESET_SETS[idx].data;
}

function showLearnMode() {

  document.getElementById("pasteCard").classList.add("hidden");
  const learnCard = document.getElementById("learnCard");
  learnCard.classList.remove("hidden");

  // Scroll the prompt into view after it's rendered
  setTimeout(() => {
    const prompt = document.querySelector("#learnArea .prompt");
    if (prompt) {
      prompt.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }
  }, 50);

}

function saveProgress() {
  localStorage.setItem('quizletLearn', JSON.stringify(cards));
}

function loadProgress() {

  const saved = localStorage.getItem('quizletLearn');

  if (!saved) return false;

  try {
    cards = JSON.parse(saved);
    return true;
  } catch(e) {
    return false;
  }
}

function rebuildQueue() {

  queue = cards.filter(c => c.streak < 2);
  queue.sort(() => Math.random() - 0.5);
}

function startLearn(fromSaved) {

  if (!fromSaved) {

    const raw = document.getElementById("dataInput").value.trim();

    if (!raw) return;

    cards = raw.split("\n").map(line => {

      const [term, answers] = line.split("\t");

      return {
        term: term.trim(),
        answers: answers.split(";").map(a => a.trim().toLowerCase()),
        streak: 0,
        correct: 0,
        wrong: 0
      };

    });

  }

  lastCard = null;
  correctionMode = false;
  isTransitioning = false;

  saveProgress();

  showLearnMode();

  nextCard();
}

function nextCard() {

  rebuildQueue();

  if (queue.length === 0) {

    showStats();

    localStorage.removeItem('quizletLearn');

    return;
  }

  if (queue.length > 1 && queue[0] === lastCard) {
    queue.push(queue.shift());
  }

  current = queue[0];
  lastCard = current;
  correctionMode = false;
  isTransitioning = false;

  renderPrompt();
}

function renderPrompt() {
  document.getElementById("learnArea").innerHTML = `
    <div class="prompt">${current.term}</div>

    <input type="text" id="answerInput">

    <button onclick="checkAnswer()">Check</button>

    <div class="feedback" id="feedback"></div>

    <div class="streak">Progress: ${current.streak} / 2</div>

    <div class="progress">Remaining cards: ${queue.length}</div>
  `;

const input = document.getElementById("answerInput");

// Only focus if:
// - this is the first card OR
// - we're in correction mode OR
// - user just finished a card and keyboard was already open
if (correctionMode || !isTransitioning) {
  setTimeout(() => {
    input.focus();    // keeps keyboard open
    input.select();
  }, 50);
}

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
  });

  // Scroll prompt into view
  setTimeout(() => {
    const prompt = document.querySelector("#learnArea .prompt");
    if (prompt) {
      prompt.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, 50);
}

function showStats() {

  const totalCorrect = cards.reduce((a,c)=>a+c.correct,0);
  const totalWrong = cards.reduce((a,c)=>a+c.wrong,0);
  const total = totalCorrect + totalWrong;

  const accuracy = total ? Math.round((totalCorrect/total)*100) : 100;

  const sorted = [...cards].sort((a,b)=>b.wrong-a.wrong);

  const weak = sorted
    .filter(c=>c.wrong>0)
    //.slice(0,10)
    .map(c=>`<li>${c.term} — ${c.wrong} mistakes</li>`)
    .join("");

  const perfect = cards
    .filter(c=>c.wrong===0)
    .length;

  document.getElementById("learnArea").innerHTML = `

    <h2>📊 Session Stats</h2>

    <p><strong>Accuracy:</strong> ${accuracy}%</p>
    <p><strong>Correct answers:</strong> ${totalCorrect}</p>
    <p><strong>Mistakes:</strong> ${totalWrong}</p>

    <p><strong>Perfect cards:</strong> ${perfect} / ${cards.length}</p>

    <h3>Weakest Cards</h3>

    ${
      weak
      ? `<ul>${weak}</ul>`
      : "<p>No mistakes 🎉</p>"
    }

    <button onclick="location.reload()">Study Again</button>

  `;

}

function checkAnswer() {

  if (isTransitioning) return;

  const inputEl = document.getElementById("answerInput");

  const input = inputEl.value.trim().toLowerCase();

  const feedback = document.getElementById("feedback");

  if (correctionMode) {

    if (current.answers.includes(input)) {

      feedback.textContent = "✔ Locked in. You'll see this again.";
      feedback.className = "feedback correct";

      isTransitioning = true;

      inputEl.disabled = true;

      // DO NOT count this as correct
      // The mistake was already recorded

      setTimeout(() => {

        isTransitioning = false;

        saveProgress();

        nextCard();

      }, 700);

    } else {

      feedback.innerHTML = `
        Incorrect.<br>
        Correct answers: <strong>${current.answers.join(", ")}</strong><br>
        <em>Please type the correct answer to continue.</em>
      `;

      feedback.className = "feedback incorrect";

    }

    return;
  }

  if (current.answers.includes(input)) {

    current.streak++;

    feedback.textContent = "Correct!";

    feedback.className = "feedback correct";

    isTransitioning = true;

    inputEl.disabled = true;

    saveProgress();

    setTimeout(() => {

      isTransitioning = false;

      nextCard();

    }, 600);

  } else {

    current.streak = 0;
    current.wrong++;

    correctionMode = true;

    feedback.innerHTML = `
      Incorrect.<br>
      Correct answers: <strong>${current.answers.join(", ")}</strong><br>
      <em>Please type the correct answer to continue.</em>
    `;

    feedback.className = "feedback incorrect";

    inputEl.value = "";

    inputEl.focus();

    saveProgress();
  }

}

populatePresets();

window.addEventListener('load', () => {

  const saved = localStorage.getItem('quizletLearn');

  if (saved) {

    if (confirm("Resume previous session?")) {

      if (loadProgress()) {

        showLearnMode();

        startLearn(true);

        return;
      }
    }

    localStorage.removeItem('quizletLearn');
  }

});

</script>

</body>
</html>
