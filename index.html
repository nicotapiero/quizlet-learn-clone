<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizlet Learn Clone with Save</title>
  <style>
body {
  font-family: system-ui, sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 16px;
  font-size: 18px;
}
h1 { text-align: center; margin-bottom: 20px; }
.container { max-width: 700px; margin: auto; }
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.hidden { display: none; }
textarea {
  width: 100%;
  height: 200px;
  font-family: monospace;
  padding: 12px;
  box-sizing: border-box;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  padding: 14px 18px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
}
button:hover { background: #2563eb; }
.prompt { font-size: 28px; margin-bottom: 18px; }
input[type="text"] {
  width: 100%;
  font-size: 20px;
  padding: 12px;
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #ccc;
}
.feedback { margin-top: 10px; font-weight: bold; }
.correct { color: green; }
.incorrect { color: red; }
.progress { margin-top: 15px; color: #555; }
.streak { margin-top: 8px; font-size: 14px; color: #666; }
.preset-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.preset-row label { font-weight: 600; white-space: nowrap; }
.preset-row select {
  flex: 1;
  font-size: 16px;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
.preset-row button { width: auto; }
.divider {
  text-align: center;
  color: #999;
  margin: 10px 0 6px;
  font-size: 13px;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  display: inline-block;
  width: 38%;
  height: 1px;
  background: #ddd;
  vertical-align: middle;
  margin: 0 6px;
}
@media (max-width: 600px) {
  body { font-size: 17px; }
  h1 { font-size: 24px; }
  .card { padding: 16px; }
  .prompt { font-size: 26px; }
  .preset-row { flex-direction: column; align-items: stretch; }
  .preset-row button { width: 100%; }
}
  </style>
</head>
<body>

<h1>Quizlet Learn (Clone with Save)</h1>

<div class="container">
  <!-- Paste Mode -->
  <div class="card" id="pasteCard">
    <h2>Paste Quizlet Set</h2>
    <div class="preset-row">
      <label for="presetSelect">Preset:</label>
      <select id="presetSelect">
        <option value="">— choose a preset set —</option>
      </select>
      <button onclick="loadPreset()">Load</button>
    </div>
    <div class="divider">or paste your own</div>
    <p>Format: <code>term[TAB]answer1;answer2</code></p>
    <textarea id="dataInput" placeholder="adult	大人;おとな"></textarea>
    <button onclick="startLearn(false)">Start Learn Mode</button>
  </div>

  <!-- Learn Mode — persistent DOM, never re-rendered -->
  <div class="card hidden" id="learnCard">
    <h2>Learn Mode</h2>
    <div class="prompt" id="promptText"></div>
    <input type="text" id="answerInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="checkBtn">Check</button>
    <div class="feedback" id="feedback"></div>
    <div class="streak" id="streakText"></div>
    <div class="progress" id="progressText"></div>
  </div>

  <!-- Done screen -->
  <div class="card hidden" id="doneCard">
    <div id="doneArea"></div>
  </div>
</div>

<script src="sets.js"></script>
<script>
  let cards = [];
  let queue = [];
  let current = null;
  let lastCard = null;
  let correctionMode = false;
  let isTransitioning = false;

  const answerInput = document.getElementById("answerInput");
  const checkBtn    = document.getElementById("checkBtn");
  const promptText  = document.getElementById("promptText");
  const feedback    = document.getElementById("feedback");
  const streakText  = document.getElementById("streakText");
  const progressText= document.getElementById("progressText");

  // Wire up once — never removed
  checkBtn.addEventListener("click", checkAnswer);
  answerInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
  });

  function populatePresets() {
    const select = document.getElementById("presetSelect");
    PRESET_SETS.forEach((set, i) => {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = set.name;
      select.appendChild(opt);
    });
  }

  function loadPreset() {
    const select = document.getElementById("presetSelect");
    const idx = select.value;
    if (idx === "") return;
    document.getElementById("dataInput").value = PRESET_SETS[idx].data;
  }

  function showLearnMode() {
    document.getElementById("pasteCard").classList.add("hidden");
    document.getElementById("doneCard").classList.add("hidden");
    document.getElementById("learnCard").classList.remove("hidden");
  }

  function saveProgress() {
    localStorage.setItem('quizletLearn', JSON.stringify(cards));
  }

  function loadProgress() {
    const saved = localStorage.getItem('quizletLearn');
    if (!saved) return false;
    try {
      cards = JSON.parse(saved);
      return true;
    } catch(e) {
      return false;
    }
  }

  function rebuildQueue() {
    queue = cards.filter(c => c.streak < 2);
    queue.sort(() => Math.random() - 0.5);
  }

  function startLearn(fromSaved) {
    if (!fromSaved) {
      const raw = document.getElementById("dataInput").value.trim();
      if (!raw) return;
      cards = raw.split("\n").map(line => {
        const [term, answers] = line.split("\t");
        return {
          term: term.trim(),
          answers: answers.split(";").map(a => a.trim().toLowerCase()),
          streak: 0,
          mistakes: 0
        };
      });
    }

    lastCard = null;
    correctionMode = false;
    isTransitioning = false;

    saveProgress();
    showLearnMode();
    nextCard();
    setTimeout(() => {
      promptText.scrollIntoView({ behavior: "instant", block: "start" });
    }, 50);
  }

  function nextCard() {
    rebuildQueue();

    if (queue.length === 0) {
      const stats = [...cards].sort((a, b) => b.mistakes - a.mistakes);
      let statsHTML = `<h3>🎉 All cards mastered!</h3><p>Mistakes per card:</p><ul>`;
      stats.forEach(c => {
        statsHTML += `<li>${c.term} — mistakes: ${c.mistakes}</li>`;
      });
      statsHTML += `</ul><button onclick="restart()">Restart</button>`;

      document.getElementById("learnCard").classList.add("hidden");
      document.getElementById("doneCard").classList.remove("hidden");
      document.getElementById("doneArea").innerHTML = statsHTML;
      localStorage.removeItem('quizletLearn');
      return;
    }

    if (queue.length > 1 && queue[0] === lastCard) {
      queue.push(queue.shift());
    }

    current = queue[0];
    lastCard = current;
    correctionMode = false;
    isTransitioning = false;

    renderPrompt();
  }

  function renderPrompt() {
    promptText.textContent = current.term;
    feedback.textContent = "";
    feedback.className = "feedback";
    streakText.textContent = `Progress: ${current.streak} / 2`;
    progressText.textContent = `Remaining cards: ${queue.length}`;

    // Keep keyboard alive — never touch readOnly or disabled
    answerInput.value = "";
    promptText.scrollIntoView({ behavior: "instant", block: "start" });
    answerInput.focus();
  }

  function restart() {
    document.getElementById("doneCard").classList.add("hidden");
    document.getElementById("pasteCard").classList.remove("hidden");
    document.getElementById("dataInput").value = '';
  }

  function checkAnswer() {
    if (isTransitioning) return;

    const input = answerInput.value.trim().toLowerCase();

    if (correctionMode) {
      if (current.answers.includes(input)) {
        feedback.textContent = "✔ Locked in. You'll see this again.";
        feedback.className = "feedback correct";

        isTransitioning = true;
        answerInput.value = "";

        saveProgress();
        setTimeout(() => {
          isTransitioning = false;
          nextCard();
        }, 700);
      } else {
        feedback.innerHTML = `
          Incorrect.<br>
          Correct answers: <strong>${current.answers.join(", ")}</strong><br>
          <em>Please type the correct answer to continue.</em>
        `;
        feedback.className = "feedback incorrect";
      }
      return;
    }

    if (current.answers.includes(input)) {
      current.streak++;
      feedback.textContent = "Correct!";
      feedback.className = "feedback correct";

      isTransitioning = true;
      answerInput.value = "";

      saveProgress();
      setTimeout(() => {
        isTransitioning = false;
        nextCard();
      }, 600);

    } else {
      current.streak = 0;
      correctionMode = true;
      current.mistakes++;

      feedback.innerHTML = `
        Incorrect.<br>
        Correct answers: <strong>${current.answers.join(", ")}</strong><br>
        <em>Please type the correct answer to continue.</em>
      `;
      feedback.className = "feedback incorrect";

      answerInput.value = "";
      // focus() here is still within the user gesture (click/keydown) — works on iOS
      answerInput.focus();

      saveProgress();
    }
  }

  // Init
  populatePresets();

  window.addEventListener('load', () => {
    const saved = localStorage.getItem('quizletLearn');
    if (saved) {
      if (confirm("Resume previous session?")) {
        if (loadProgress()) {
          showLearnMode();
          startLearn(true);
          return;
        }
      }
      localStorage.removeItem('quizletLearn');
    }
  });
</script>

</body>
</html>
